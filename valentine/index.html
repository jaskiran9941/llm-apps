<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Will you be my Valentine? 💕</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #ffb3c6 0%, #ff85a1 40%, #ffc8dd 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Georgia', serif;
      overflow: hidden;
    }

    /* Floating hearts background */
    .hearts-bg {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none;
      z-index: 0;
    }

    .heart-particle {
      position: absolute;
      bottom: -50px;
      font-size: 1.5rem;
      animation: floatUp linear infinite;
      opacity: 0.6;
    }

    @keyframes floatUp {
      0%   { transform: translateY(0) rotate(0deg); opacity: 0.6; }
      100% { transform: translateY(-110vh) rotate(20deg); opacity: 0; }
    }

    .card {
      position: relative;
      z-index: 1;
      text-align: center;
      padding: 3rem 2.5rem 2.5rem;
      background: rgba(255, 255, 255, 0.25);
      backdrop-filter: blur(12px);
      border-radius: 2rem;
      box-shadow: 0 8px 40px rgba(200, 50, 100, 0.2);
      max-width: 420px;
      width: 90%;
      border: 1.5px solid rgba(255, 255, 255, 0.5);
    }

    .question {
      font-size: 1.85rem;
      color: #c0336e;
      font-weight: bold;
      text-shadow: 1px 1px 0 rgba(255,255,255,0.6);
      margin-bottom: 1.8rem;
      letter-spacing: 0.02em;
      line-height: 1.3;
    }

    .character {
      font-size: 7rem;
      margin-bottom: 1.5rem;
      display: block;
      animation: bounce 1.8s ease-in-out infinite;
      transition: all 0.4s ease;
      line-height: 1;
    }

    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50%       { transform: translateY(-12px); }
    }

    .buttons {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 1rem;
      margin-top: 1rem;
      flex-wrap: wrap;
      min-height: 80px;
    }

    .btn-yes {
      background: linear-gradient(135deg, #4caf50, #2e7d32);
      color: white;
      border: none;
      border-radius: 0.8rem;
      font-size: 1.4rem;
      font-weight: bold;
      padding: 0.75em 1.6em;
      cursor: pointer;
      box-shadow: 0 4px 15px rgba(76,175,80,0.4);
      transition: transform 0.15s ease, box-shadow 0.15s ease;
      letter-spacing: 0.04em;
    }

    .btn-yes:hover {
      transform: scale(1.06);
      box-shadow: 0 6px 22px rgba(76,175,80,0.55);
    }

    .btn-yes:active {
      transform: scale(0.97);
    }

    .btn-no {
      background: linear-gradient(135deg, #b71c1c, #8b0000);
      color: white;
      border: none;
      border-radius: 0.7rem;
      font-size: 1rem;
      font-weight: bold;
      padding: 0.6em 1.2em;
      cursor: pointer;
      box-shadow: 0 3px 10px rgba(183,28,28,0.35);
      transition: transform 0.15s ease, box-shadow 0.15s ease, font-size 0.4s ease, padding 0.4s ease, opacity 0.5s ease;
      white-space: nowrap;
      letter-spacing: 0.02em;
      position: relative;
    }

    .btn-no:hover {
      transform: scale(1.03);
    }

    /* Success screen */
    #successScreen {
      display: none;
      position: fixed;
      inset: 0;
      background: linear-gradient(135deg, #ffe0eb, #ffb3c6, #ff85a1);
      z-index: 100;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      text-align: center;
      padding: 2rem;
      animation: fadeIn 0.6s ease;
    }

    #successScreen.show {
      display: flex;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: scale(0.9); }
      to   { opacity: 1; transform: scale(1); }
    }

    .success-emoji {
      font-size: 7rem;
      animation: spin 1s ease, bounce 1.8s ease-in-out 1s infinite;
      margin-bottom: 1rem;
    }

    @keyframes spin {
      0%   { transform: rotate(-20deg) scale(0.5); }
      50%  { transform: rotate(10deg) scale(1.2); }
      100% { transform: rotate(0deg) scale(1); }
    }

    .success-title {
      font-size: 2.4rem;
      color: #c0336e;
      font-weight: bold;
      text-shadow: 1px 1px 0 rgba(255,255,255,0.7);
      margin-bottom: 0.7rem;
    }

    .success-sub {
      font-size: 1.2rem;
      color: #8b1a4a;
      max-width: 320px;
      line-height: 1.5;
    }

    .confetti-burst {
      position: fixed;
      top: 50%; left: 50%;
      pointer-events: none;
      z-index: 200;
    }

    .confetti-piece {
      position: absolute;
      width: 10px; height: 10px;
      border-radius: 2px;
      animation: confettiFall 1.6s ease-out forwards;
    }

    @keyframes confettiFall {
      0%   { transform: translate(0, 0) rotate(0deg); opacity: 1; }
      100% { transform: translate(var(--dx), var(--dy)) rotate(720deg); opacity: 0; }
    }
  </style>
</head>
<body>

<div class="hearts-bg" id="heartsBg"></div>

<div class="card" id="mainCard">
  <div class="question">Will you be my Valentine? 💕</div>
  <span class="character" id="character">🐾</span>
  <div class="buttons">
    <button class="btn-yes" id="btnYes" onclick="handleYes()">Yes</button>
    <button class="btn-no"  id="btnNo"  onclick="handleNo()">No</button>
  </div>
</div>

<div id="successScreen">
  <div class="success-emoji" id="successEmoji">🥰</div>
  <div class="success-title">Yay!! I knew it! 💖</div>
  <div class="success-sub" id="successSub">You just made everything so much better. I love you! 💝</div>
</div>

<script>
  // --- State ---
  let noClickCount = 0;

  const noTexts = [
    "No",
    "Pookie please... 🐾",
    "Are you positive? 🤔",
    "Think again! 💭",
    "Pretty please? 🥺",
    "I'll cry... 😢",
    "Last chance! 💔",
    "You sure? 😟",
    "Come on!! 🙈",
    "Okayyyy... 😭"
  ];

  const characters = [
    "🐾",   // default
    "🐹",   // hamster
    "😢",   // sad
    "🥺",   // pleading
    "😭",   // crying
    "🙈",   // hiding
    "💔",   // broken heart
    "🐱",   // kitty
    "🫠",   // melting
    "🤍"    // fading hope
  ];

  const yesSizes = [
    1.4, 1.6, 1.9, 2.3, 2.7, 3.2, 3.8, 4.4, 5.0, 5.8
  ];

  const noSizes = [
    1.0, 0.9, 0.8, 0.7, 0.6, 0.5, 0.42, 0.34, 0.26, 0.18
  ];

  const btnYes = document.getElementById('btnYes');
  const btnNo  = document.getElementById('btnNo');
  const charEl = document.getElementById('character');

  function handleNo() {
    if (noClickCount >= noTexts.length - 1) return;
    noClickCount++;

    // Update No button text & shrink
    const noIdx  = Math.min(noClickCount, noTexts.length - 1);
    const yesIdx = Math.min(noClickCount, yesSizes.length - 1);

    btnNo.textContent = noTexts[noIdx];
    btnNo.style.fontSize = noSizes[noIdx] + 'rem';

    // Grow Yes button
    btnYes.style.fontSize = yesSizes[yesIdx] + 'rem';

    // Change character
    const cIdx = Math.min(noClickCount, characters.length - 1);
    charEl.textContent = characters[cIdx];

    // Hide No button on last click
    if (noClickCount >= noTexts.length - 1) {
      btnNo.style.opacity = '0';
      btnNo.style.pointerEvents = 'none';
    }
  }

  function handleYes() {
    launchConfetti();
    setTimeout(() => {
      document.getElementById('successScreen').classList.add('show');
    }, 300);
  }

  // --- Confetti ---
  function launchConfetti() {
    const colors = ['#ff6b9d','#ffd700','#ff85a1','#a8edea','#ff4081','#fff'];
    const burst = document.createElement('div');
    burst.className = 'confetti-burst';
    document.body.appendChild(burst);

    for (let i = 0; i < 60; i++) {
      const piece = document.createElement('div');
      piece.className = 'confetti-piece';
      const angle = Math.random() * 360;
      const dist  = 120 + Math.random() * 220;
      const dx = Math.cos(angle * Math.PI / 180) * dist + 'px';
      const dy = (Math.sin(angle * Math.PI / 180) * dist - 80) + 'px';
      piece.style.cssText = `
        background: ${colors[Math.floor(Math.random() * colors.length)]};
        --dx: ${dx}; --dy: ${dy};
        left: ${Math.random() * 40 - 20}px;
        top:  ${Math.random() * 40 - 20}px;
        animation-delay: ${Math.random() * 0.3}s;
        width: ${6 + Math.random() * 8}px;
        height: ${6 + Math.random() * 8}px;
      `;
      burst.appendChild(piece);
    }
    setTimeout(() => burst.remove(), 2200);
  }

  // --- Floating hearts background ---
  function spawnHeart() {
    const bg = document.getElementById('heartsBg');
    const h = document.createElement('span');
    h.className = 'heart-particle';
    h.textContent = ['💕','💖','💗','💝','🌸','✨'][Math.floor(Math.random() * 6)];
    h.style.left = Math.random() * 100 + 'vw';
    h.style.fontSize = (0.8 + Math.random() * 1.4) + 'rem';
    const dur = 6 + Math.random() * 8;
    h.style.animationDuration = dur + 's';
    h.style.animationDelay = (Math.random() * 4) + 's';
    bg.appendChild(h);
    setTimeout(() => h.remove(), (dur + 4) * 1000);
  }

  // Seed initial hearts then keep spawning
  for (let i = 0; i < 14; i++) spawnHeart();
  setInterval(spawnHeart, 900);
</script>
</body>
</html>
