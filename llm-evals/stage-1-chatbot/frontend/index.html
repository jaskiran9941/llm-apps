<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TaskFlow Support</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #f5f5f5; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
    .chat-container { background: white; border-radius: 12px; box-shadow: 0 4px 24px rgba(0,0,0,0.1); width: 640px; max-width: 95vw; display: flex; flex-direction: column; height: 80vh; }
    .header { padding: 20px 24px; border-bottom: 1px solid #eee; }
    .header h1 { font-size: 18px; font-weight: 600; color: #111; }
    .header p { font-size: 13px; color: #666; margin-top: 2px; }
    .messages { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 12px; }
    .message { max-width: 80%; padding: 10px 14px; border-radius: 12px; font-size: 14px; line-height: 1.5; }
    .message.user { background: #2563eb; color: white; align-self: flex-end; border-bottom-right-radius: 4px; }
    .message.assistant { background: #f1f1f1; color: #111; align-self: flex-start; border-bottom-left-radius: 4px; }
    .message.error { background: #fee2e2; color: #991b1b; align-self: flex-start; }
    .input-area { padding: 16px 20px; border-top: 1px solid #eee; display: flex; gap: 10px; }
    textarea { flex: 1; border: 1px solid #ddd; border-radius: 8px; padding: 10px 14px; font-size: 14px; font-family: inherit; resize: none; outline: none; height: 44px; line-height: 1.4; }
    textarea:focus { border-color: #2563eb; }
    button { background: #2563eb; color: white; border: none; border-radius: 8px; padding: 0 20px; font-size: 14px; font-weight: 500; cursor: pointer; height: 44px; }
    button:hover { background: #1d4ed8; }
    button:disabled { background: #93c5fd; cursor: not-allowed; }
  </style>
</head>
<body>
  <div class="chat-container">
    <div class="header">
      <h1>TaskFlow Support</h1>
      <p>Ask me anything about TaskFlow — pricing, features, or troubleshooting.</p>
    </div>
    <div class="messages" id="messages"></div>
    <div class="input-area">
      <textarea id="input" placeholder="Ask a question..." rows="1"></textarea>
      <button id="send">Send</button>
    </div>
  </div>

  <script>
    const messagesEl = document.getElementById("messages");
    const inputEl = document.getElementById("input");
    const sendBtn = document.getElementById("send");
    let history = [];

    function appendMessage(role, content) {
      const el = document.createElement("div");
      el.className = `message ${role}`;
      el.textContent = content;
      messagesEl.appendChild(el);
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    async function sendMessage() {
      const text = inputEl.value.trim();
      if (!text) return;
      inputEl.value = "";
      sendBtn.disabled = true;

      history.push({ role: "user", content: text });
      appendMessage("user", text);

      try {
        const res = await fetch("/chat", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ messages: history }),
        });
        const data = await res.json();
        history = data.messages.filter(m => m.role !== "system");
        const last = history[history.length - 1];
        appendMessage("assistant", last.content);
      } catch (e) {
        appendMessage("error", "Oops! Something went wrong. Please try again.");
      } finally {
        sendBtn.disabled = false;
        inputEl.focus();
      }
    }

    sendBtn.addEventListener("click", sendMessage);
    inputEl.addEventListener("keydown", (e) => {
      if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); sendMessage(); }
    });
  </script>
</body>
</html>
